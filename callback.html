<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Authorization complete — DealRadar Publisher</title>
<style>
  body{font-family:-apple-system,Segoe UI,Arial,sans-serif;max-width:720px;margin:80px auto;padding:0 20px;color:#222;text-align:center}
  h1{color:#1abc9c}
</style>
</head>
<body>
<h1>Authorization complete</h1>
<p>You can close this window and return to DealRadar Publisher.</p>
<p id="code" style="font-family:monospace;color:#888;word-break:break-all"></p>
<script>
  // Hien authorization code de copy vao tool (flow thu cong, khong gui di dau)
  const p = new URLSearchParams(location.search);
  if (p.get("code")) document.getElementById("code").textContent = "code: " + p.get("code");
</script>
</body>
</html>
